server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/localmart_orders
    username: localmart
    password: localmart123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Kafka — producer and consumer config
  kafka:
    bootstrap-servers: localhost:9092  # Kafka broker — host apps use port 9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      # JsonSerializer converts our event records to JSON before sending to Kafka
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Don't add Spring's __TypeId__ header — payment-service is .NET and won't understand it
        spring.json.add.type.headers: false
    consumer:
      group-id: order-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # StringDeserializer receives raw JSON string — we manually parse it with ObjectMapper
      # This avoids Spring's type header dependency, making it cross-language compatible
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      # earliest: on first start, read from the beginning of the topic
      # (so no events are missed if consumer was down when the message arrived)
      auto-offset-reset: earliest

  # Feign client timeouts — moved under spring.cloud.openfeign in Spring Cloud 2023+
  # connect-timeout: how long to wait when establishing connection to another service
  # read-timeout: how long to wait for the other service to respond
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

# Resilience4j circuit breaker — one instance config per downstream service
# sliding-window-size: how many recent calls to track
# failure-rate-threshold: % of failures that triggers OPEN state
# minimum-number-of-calls: minimum calls before failure rate is calculated
# wait-duration-in-open-state: how long circuit stays OPEN before trying again (ms)
# permitted-number-of-calls-in-half-open-state: test calls allowed in HALF_OPEN
resilience4j:

  # ── Retry ────────────────────────────────────────────────────────────────────
  # Fires BEFORE the circuit breaker counts a failure.
  # max-attempts: total tries including the first (3 = 1 original + 2 retries)
  # wait-duration: pause between attempts — gives the downstream a moment to recover
  # retry-exceptions: ONLY retry on connection/timeout failures (transient infrastructure problems)
  # ignore-exceptions: never retry on 4xx — same business error will come back regardless
  retry:
    instances:
      shop-service:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - feign.RetryableException
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException
      user-service:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - feign.RetryableException
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException

  # ── Circuit Breaker ───────────────────────────────────────────────────────────
  # Fires AFTER retry — sees the final outcome of all attempts as one logical call.
  # sliding-window-size: how many recent final outcomes to track
  # failure-rate-threshold: % of final failures that trips the circuit to OPEN
  # minimum-number-of-calls: minimum outcomes before rate is calculated
  # wait-duration-in-open-state: howal long circuit stays OPEN before probing again (ms)
  # permitted-number-of-calls-in-half-open-state: test calls lowed during probe
  circuitbreaker:
    instances:
      shop-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        # 4xx errors are business errors, not infrastructure failures — don't count them.
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        # circuitbreakers  → current state (CLOSED / OPEN / HALF_OPEN) + counters
        # circuitbreakerevents → recent call history (SUCCESS, ERROR, IGNORED_ERROR, NOT_PERMITTED, ...)
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[com.localmart]': DEBUG
