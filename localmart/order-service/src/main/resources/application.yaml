server:
  port: 8083

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/localmart_orders
    username: localmart
    password: localmart123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Feign client timeouts — moved under spring.cloud.openfeign in Spring Cloud 2023+
  # connect-timeout: how long to wait when establishing connection to another service
  # read-timeout: how long to wait for the other service to respond
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 3000
            read-timeout: 5000

# Resilience4j circuit breaker — one instance config per downstream service
# sliding-window-size: how many recent calls to track
# failure-rate-threshold: % of failures that triggers OPEN state
# minimum-number-of-calls: minimum calls before failure rate is calculated
# wait-duration-in-open-state: how long circuit stays OPEN before trying again (ms)
# permitted-number-of-calls-in-half-open-state: test calls allowed in HALF_OPEN
resilience4j:
  circuitbreaker:
    instances:
      shop-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        # 4xx errors (shop/product not found) are business errors, not infrastructure failures.
        # Ignore them so they don't count toward circuit breaker failure rate.
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException
      user-service:
        sliding-window-size: 10
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
        # Same reason — 404 user not found is a valid business response, not a service failure.
        ignore-exceptions:
          - com.localmart.order_service.exception.ResourceNotFoundException

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        # circuitbreakers  → current state (CLOSED / OPEN / HALF_OPEN) + counters
        # circuitbreakerevents → recent call history (SUCCESS, ERROR, IGNORED_ERROR, NOT_PERMITTED, ...)
        include: health, info, circuitbreakers, circuitbreakerevents
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[com.localmart]': DEBUG
