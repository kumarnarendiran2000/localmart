services:

  # ─────────────────────────────────────────────
  # PostgreSQL — relational database
  # Used by: user-service, order-service, payment-service
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: localmart-postgres
    environment:
      POSTGRES_USER: localmart
      POSTGRES_PASSWORD: localmart123
      POSTGRES_DB: localmart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MongoDB — document database
  # Used by: shop-service, notification-service
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: localmart-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: localmart
      MONGO_INITDB_ROOT_PASSWORD: localmart123
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # pgAdmin 4 — browser UI for PostgreSQL
  # Open: http://localhost:5050
  # Login: admin@localmart.dev / admin123
  # Then add server: host=localmart-postgres, port=5432, user=localmart, pass=localmart123
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: localmart-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localmart.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # mongo-express — browser UI for MongoDB
  # Open: http://localhost:8091
  # Login: admin / pass (set below)
  # ─────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: localmart-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: localmart
      ME_CONFIG_MONGODB_ADMINPASSWORD: localmart123
      ME_CONFIG_MONGODB_SERVER: localmart-mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    ports:
      - "8091:8081"
    depends_on:
      mongodb:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # Apache Kafka — KRaft mode (no ZooKeeper)
  #
  # Two listeners — why both are needed:
  #   PLAINTEXT://localhost:9092       ← host apps (Spring Boot, .NET running on your machine)
  #   PLAINTEXT_INTERNAL://localmart-kafka:29092  ← Docker containers (Kafka UI, future services in Docker)
  #
  # Host apps use localhost:9092 via Docker port mapping.
  # Containers can't use localhost — they use the container name as hostname.
  # Without the second listener, Kafka UI would fail to connect.
  #
  # Named volume avoids Windows bind-mount permission issues (no chown needed).
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: localmart-kafka
    ports:
      - "9092:9092"     # host apps connect here
      - "29092:29092"   # docker containers connect here (Kafka UI, future Dockerized services)
    environment:
      KAFKA_KRAFT_MODE: "true"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localmart-kafka:9093"
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092,CONTROLLER://localmart-kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://localmart-kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─────────────────────────────────────────────
  # Kafka UI — browser UI for topics and messages
  # Open: http://localhost:8090
  # Connects to Kafka via internal Docker network (localmart-kafka:29092)
  # ─────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: localmart-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: localmart
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: localmart-kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

# Named volumes — Docker manages the data on your machine
volumes:
  postgres-data:
  mongodb-data:
  kafka-data:
