services:

  # ─────────────────────────────────────────────
  # PostgreSQL — relational database
  # Used by: user-service, order-service, payment-service
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: localmart-postgres
    environment:
      POSTGRES_USER: localmart
      POSTGRES_PASSWORD: localmart123
      POSTGRES_DB: localmart
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localmart"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # MongoDB — document database
  # Used by: shop-service, notification-service
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: localmart-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: localmart
      MONGO_INITDB_ROOT_PASSWORD: localmart123
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # pgAdmin 4 — browser UI for PostgreSQL
  # Open: http://localhost:5050
  # Login: admin@localmart.dev / admin123
  # Then add server: host=localmart-postgres, port=5432, user=localmart, pass=localmart123
  # ─────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: localmart-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@localmart.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # mongo-express — browser UI for MongoDB
  # Open: http://localhost:8091
  # Login: admin / pass (set below)
  # ─────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: localmart-mongo-express
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: localmart
      ME_CONFIG_MONGODB_ADMINPASSWORD: localmart123
      ME_CONFIG_MONGODB_SERVER: localmart-mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass
    ports:
      - "8091:8081"
    depends_on:
      mongodb:
        condition: service_healthy

# Named volumes — Docker manages the data on your machine
volumes:
  postgres-data:
  mongodb-data:
