server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      mvc:
        # Route table — the gateway reads this on startup.
        # Each route = one rule: if URL matches the predicate → forward to that service.
        # lb://SERVICE-NAME means: look up SERVICE-NAME in Eureka, pick a healthy instance.
        routes:

          - id: shop-service-route
            uri: lb://shop-service
            predicates:
              - Path=/api/shops/**

          - id: user-service-route
            uri: lb://user-service
            predicates:
              - Path=/api/users/**

          - id: order-service-route
            uri: lb://order-service
            predicates:
              - Path=/api/orders/**

          - id: payment-service-route
            uri: lb://payment-service
            predicates:
              - Path=/api/payments/**

          - id: notification-service-route
            uri: lb://notification-service
            predicates:
              - Path=/api/notifications/**

# Eureka client config — gateway uses this to discover other services
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true   # register with IP instead of hostname (avoids DNS issues locally)

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    '[com.localmart]': DEBUG
    org.springframework.cloud.gateway: DEBUG   # logs which route matched each request
